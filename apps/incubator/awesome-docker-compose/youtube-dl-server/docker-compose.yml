services:
  youtube-dl-server:
    image: nbr23/youtube-dl-server:latest
    container_name: youtube-dl-server
    ports:
      - "8080:8080"
    environment:
      - YOUTUBE_DL_UPDATE=true
      - YDL_FORMAT=bestvideo+bestaudio/best
    volumes:
      - ./downloads:/youtube-dl
    restart: unless-stopped
