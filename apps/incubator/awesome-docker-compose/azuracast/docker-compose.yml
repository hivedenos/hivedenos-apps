services:
  web:
    image: azuracast/azuracast:latest
    restart: always
    ports:
      - '${AZURACAST_HTTP_PORT:-80}:80'
      - '${AZURACAST_HTTPS_PORT:-443}:443'
      - '${AZURACAST_SFTP_PORT:-2022}:2022'
      - '8000-8010:8000-8010'
    environment:
      - AZURACAST_DC_REVISION=1
      - MYSQL_HOST=mariadb
      - MYSQL_PORT=3306
      - MYSQL_USER=azuracast
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=azuracast
      - INFLUXDB_HOST=influxdb
      - INFLUXDB_PORT=8086
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data/www:/var/azuracast/www
      - ./data/backups:/var/azuracast/backups
      - ./data/station_data:/var/azuracast/stations
    depends_on:
      - mariadb
      - influxdb
      - redis

  mariadb:
    image: mariadb:10.6
    restart: always
    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci']
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=azuracast
      - MYSQL_USER=azuracast
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./data/db:/var/lib/mysql

  influxdb:
    image: influxdb:1.8
    restart: always
    volumes:
      - ./data/influx:/var/lib/influxdb

  redis:
    image: redis:7.0-alpine
    restart: always
    volumes:
      - ./data/redis:/data
