services:
  para:
    image: erudika/para:latest
    container_name: para
    ports:
      - "8080:8080"
    environment:
      - PARA_ENV=production
      - PARA_PORT=8080
      - PARA_ROOT_APP_ACCESS_KEY=${PARA_ROOT_APP_ACCESS_KEY}
      - PARA_ROOT_APP_SECRET_KEY=${PARA_ROOT_APP_SECRET_KEY}
    volumes:
      - ./para-data:/para/data
    restart: unless-stopped
