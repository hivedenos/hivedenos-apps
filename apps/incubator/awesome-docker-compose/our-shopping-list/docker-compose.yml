services:
  our-shopping-list:
    image: ourshoppinglist/our-shopping-list:latest
    container_name: our-shopping-list
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MONGO_URL=mongodb://mongo:27017/osl
    depends_on:
      - mongo

  mongo:
    image: mongo:4
    container_name: osl-mongo
    restart: unless-stopped
    volumes:
      - ./data/mongo:/data/db
