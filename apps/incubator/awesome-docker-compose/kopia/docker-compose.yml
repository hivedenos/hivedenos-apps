services:
  kopia:
    image: kopia/kopia:latest
    container_name: kopia
    ports:
      - "51515:51515"
    environment:
      - TZ=UTC
    volumes:
      - ./config:/app/config
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./source:/source:ro
    command:
      - server
      - start
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=${KOPIA_USERNAME}
      - --server-password=${KOPIA_PASSWORD}
    restart: unless-stopped
