services:
  zusam:
    image: zusam/zusam:latest
    container_name: zusam
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      - ZUSAM_SECRET_KEY=${ZUSAM_SECRET_KEY}
      # Optional: Define the base URL if running behind a reverse proxy
      # - ZUSAM_BASE_URL=https://your-domain.com
