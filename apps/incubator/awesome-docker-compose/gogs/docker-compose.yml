services:
  gogs:
    image: gogs/gogs:latest
    container_name: gogs
    ports:
      - "10080:3000"
      - "10022:22"
    volumes:
      - ./gogs-data:/data
    depends_on:
      - db
    restart: always

  db:
    image: postgres:14-alpine
    container_name: gogs_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: always
