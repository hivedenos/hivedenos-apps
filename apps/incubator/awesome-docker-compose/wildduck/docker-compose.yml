services:
  wildduck:
    image: nodemailer/wildduck:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
    environment:
      - TZ=${TIMEZONE}
      - NODE_ENV=production
    volumes:
      - ./config:/etc/wildduck
      - ./ssl:/etc/ssl/wildduck
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:5.0
    restart: always
    volumes:
      - ./data/mongo:/data/db

  redis:
    image: redis:6.2-alpine
    restart: always
    volumes:
      - ./data/redis:/data
