services:
  zincsearch:
    image: zinclabs/zincsearch:latest
    container_name: zincsearch
    restart: unless-stopped
    ports:
      - "4080:4080"
    environment:
      - ZINC_FIRST_ADMIN_USER=${ZINC_FIRST_ADMIN_USER}
      - ZINC_FIRST_ADMIN_PASSWORD=${ZINC_FIRST_ADMIN_PASSWORD}
      - ZINC_DATA_PATH=/data
    volumes:
      - ./data:/data
