services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - URL=${DOMAIN_NAME}
      - VALIDATION=http
      - SUBDOMAINS=www,
      - CERTPROVIDER=letsencrypt
      - EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - ./config:/config
    ports:
      - 443:443
      - 80:80
    restart: unless-stopped
