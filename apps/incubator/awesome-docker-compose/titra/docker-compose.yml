services:
  titra:
    image: kromit/titra
    container_name: titra
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ROOT_URL: ${ROOT_URL}
      MONGO_URL: mongodb://mongodb:27017/titra
      PORT: 3000
    depends_on:
      - mongodb

  mongodb:
    image: mongo:5
    container_name: titra-mongodb
    restart: unless-stopped
    volumes:
      - ./mongo-data:/data/db
