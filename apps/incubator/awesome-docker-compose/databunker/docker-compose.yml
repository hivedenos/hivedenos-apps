services:
  databunker:
    image: securitybunker/databunker:latest
    container_name: databunker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./conf:/databunker/conf
      - ./data:/databunker/data
    environment:
      - DATABUNKER_MASTERKEY=${DATABUNKER_MASTERKEY}
