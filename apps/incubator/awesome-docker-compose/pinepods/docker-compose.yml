services:
  pinepods:
    image: madeofpendletonwool/pinepods:latest
    container_name: pinepods
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./config:/config
      - ./data:/data
      - ./icons:/icons
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - URL=${APP_URL}
