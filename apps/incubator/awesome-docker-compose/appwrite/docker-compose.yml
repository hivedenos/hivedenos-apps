services:
  traefik:
    image: traefik:2.10
    command:
      - --providers.file.directory=/storage/config
      - --providers.file.watch=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.constraints=Label(`traefik.constraint-label-stack`,`appwrite`)
      - --entrypoints.appwrite_web.address=:80
      - --entrypoints.appwrite_websecure.address=:443
      - --api.dashboard=true
      - --ping=true
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config:/storage/config:ro
      - ./certificates:/storage/certificates:ro
    depends_on:
      - appwrite
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite

  appwrite:
    image: appwrite/appwrite:1.5.4
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./uploads:/storage/uploads
      - ./cache:/storage/cache
      - ./config:/storage/config
      - ./certificates:/storage/certificates
      - ./functions:/storage/functions
    depends_on:
      - mariadb
      - redis
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite
      - traefik.http.routers.appwrite_web.rule=PathPrefix(`/`)
      - traefik.http.routers.appwrite_web.entrypoints=appwrite_web
      - traefik.http.services.appwrite_web.loadbalancer.server.port=80

  mariadb:
    image: mariadb:10.7
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${_APP_DB_ROOT_PASS}
      - MYSQL_DATABASE=${_APP_DB_SCHEMA}
      - MYSQL_USER=${_APP_DB_USER}
      - MYSQL_PASSWORD=${_APP_DB_PASS}
    volumes:
      - ./mariadb:/var/lib/mysql
    command: 'mysqld --innodb-flush-method=O_DIRECT --wait_timeout=28800'

  redis:
    image: redis:7.0-alpine
    restart: unless-stopped
    volumes:
      - ./redis:/data

  realtime:
    image: appwrite/appwrite:1.5.4
    command: realtime
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mariadb
      - redis
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite
      - traefik.http.routers.appwrite_realtime.rule=PathPrefix(`/v1/realtime`)
      - traefik.http.routers.appwrite_realtime.entrypoints=appwrite_web
      - traefik.http.services.appwrite_realtime.loadbalancer.server.port=80

  schedule:
    image: appwrite/appwrite:1.5.4
    command: schedule
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mariadb
      - redis

  executor:
    image: appwrite/appwrite:1.5.4
    command: executor
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./functions:/storage/functions
      - ./builds:/storage/builds
    depends_on:
      - mariadb
      - redis

  worker-audits:
    image: appwrite/appwrite:1.5.4
    command: worker-audits
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mariadb
      - redis

  worker-builds:
    image: appwrite/appwrite:1.5.4
    command: worker-builds
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mariadb
      - redis

  worker-certificates:
    image: appwrite/appwrite:1.5.4
    command: worker-certificates
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./certificates:/storage/certificates
