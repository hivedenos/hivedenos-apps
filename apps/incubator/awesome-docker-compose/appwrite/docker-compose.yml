  worker-deletes:
    image: appwrite/appwrite:1.5.4
    command: worker-deletes
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./uploads:/storage/uploads
      - ./cache:/storage/cache
      - ./functions:/storage/functions
      - ./builds:/storage/builds
