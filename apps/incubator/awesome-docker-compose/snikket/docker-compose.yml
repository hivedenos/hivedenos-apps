services:
  snikket:
    container_name: snikket
    image: snikket/snikket-server:1
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "5222:5222"
      - "5269:5269"
      - "5000:5000"
      - "3478:3478"
      - "3478:3478/udp"
    volumes:
      - ./snikket_data:/snikket
    restart: unless-stopped
