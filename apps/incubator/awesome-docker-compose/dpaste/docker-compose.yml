services:
  dpaste:
    image: darrenofficial/dpaste:latest
    container_name: dpaste
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=*
      - DATABASE_URL=sqlite:////data/dpaste.db
