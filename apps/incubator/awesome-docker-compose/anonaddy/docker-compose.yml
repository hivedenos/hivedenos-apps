services:
  app:
    image: anonaddy/anonaddy:latest
    restart: always
    depends_on:
      - mariadb
      - redis
    ports:
      - "25:25"
      - "8000:8000"
    volumes:
      - ./data:/data
    env_file:
      - .env

  mariadb:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - ./redis:/data
