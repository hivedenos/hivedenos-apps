services:
  wallos:
    container_name: wallos
    image: bellamy/wallos:latest
    ports:
      - "8282:80/tcp"
    environment:
      TZ: "America/New_York"
    volumes:
      - ./db:/var/www/html/db
      - ./images:/var/www/html/images
      - ./logos:/var/www/html/logos
    restart: unless-stopped
