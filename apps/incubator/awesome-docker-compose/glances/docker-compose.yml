services:
  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    pid: host
    ports:
      - "61208-61209:61208-61209"
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config:/glances/conf
    restart: unless-stopped
