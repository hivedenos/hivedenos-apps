services:
  db-backup:
    image: tiredofit/db-backup:latest
    container_name: db-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backup
    environment:
      - DB_TYPE=mysql
      - DB_HOST=db
      - DB_NAME=my_database
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_DUMP_FREQ=1440
      - DB_DUMP_BEGIN=0000
      - DB_CLEANUP_TIME=8640
      - COMPRESSION=ZSTD
      - MD5=TRUE
      - CONTAINER_ENABLE_MONITORING=FALSE
