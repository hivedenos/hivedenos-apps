services:
  speedtest:
    image: ghcr.io/librespeed/speedtest:latest
    container_name: librespeed
    ports:
      - "8080:80"
    environment:
      - MODE=standalone
      - TELEMETRY=true
      - PASSWORD=${ADMIN_PASSWORD}
      - TITLE=Librespeed
    volumes:
      - ./data:/database
    restart: unless-stopped
