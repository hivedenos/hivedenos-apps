services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: always
    ports:
      - ${APP_PORT:-3000}:3000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3000}
      - IS_GENERAL=true
      - STORAGE_PROVIDER=local
      - UPLOAD_DIRECTORY=/app/uploads
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - postiz_network

  postgres:
    image: postgres:15-alpine
    container_name: postiz_postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postiz}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-postiz}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postiz} -d ${DB_NAME:-postiz}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - postiz_network

  redis:
    image: redis:7-alpine
    container_name: postiz_redis
    restart: always
    volumes:
      - ./data/redis:/data
    networks:
      - postiz_network

networks:
  postiz_network:
    driver: bridge
