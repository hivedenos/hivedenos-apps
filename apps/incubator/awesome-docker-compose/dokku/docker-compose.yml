services:
  dokku:
    image: dokku/dokku:latest
    container_name: dokku
    environment:
      - DOKKU_HOSTNAME=dokku.example.com
    ports:
      - "80:80"
      - "443:443"
      - "2222:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dokku-data:/mnt/dokku
    restart: unless-stopped
