services:
  pwndrop:
    image: lscr.io/linuxserver/pwndrop:latest
    container_name: pwndrop
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SECRET_PATH=${SECRET_PATH}
    volumes:
      - ./config:/config
      - ./data:/var/www/pwndrop/data
    ports:
      - 8080:8080
    restart: unless-stopped
