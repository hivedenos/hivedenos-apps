services:
  lychee:
    image: lycheeorg/lychee:latest
    container_name: lychee
    ports:
      - "8080:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=lychee
      - DB_USERNAME=lychee
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./conf:/conf
      - ./uploads:/uploads
      - ./sym:/sym
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: lychee_db
    environment:
      - MYSQL_DATABASE=lychee
      - MYSQL_USER=lychee
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./db-data:/var/lib/mysql
    restart: unless-stopped
