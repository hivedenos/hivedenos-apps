services:
  arcane:
    image: ghcr.io/getarcane/arcane:latest
    container_name: arcane
    restart: unless-stopped
    ports:
      - 8080:8080
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
