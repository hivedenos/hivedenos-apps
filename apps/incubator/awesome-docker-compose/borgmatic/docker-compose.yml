services:
  borgmatic:
    image: ghcr.io/borgmatic-collective/borgmatic:latest
    container_name: borgmatic
    restart: unless-stopped
    environment:
      - TZ=UTC
      - BORG_PASSPHRASE=${BORG_PASSPHRASE}
    volumes:
      - ./borgmatic.d:/etc/borgmatic.d
      - ./.cache:/root/.cache/borg
      - ./.config:/root/.config/borg
      - ./.ssh:/root/.ssh
      - ./data:/mnt/source:ro
      - ./repo:/mnt/repository
