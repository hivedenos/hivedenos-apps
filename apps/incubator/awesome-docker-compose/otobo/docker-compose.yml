services:
  web:
    image: rotheross/otobo:latest
    command: web
    ports:
      - "80:5000"
    environment:
      - OTOBO_DB_TYPE=mysql
      - OTOBO_DB_HOST=db
      - OTOBO_DB_PORT=3306
      - OTOBO_DB_USER=otobo
      - OTOBO_DB_PASSWORD=${OTOBO_DB_PASSWORD}
      - OTOBO_DB_NAME=otobo
      - OTOBO_ELASTICSEARCH_HOST=elastic
      - OTOBO_ELASTICSEARCH_PORT=9200
      - OTOBO_REDIS_HOST=redis
      - OTOBO_REDIS_PORT=6379
      - OTOBO_WEB_HTTP_PORT=5000
    volumes:
      - ./otobo_opt:/opt/otobo
    depends_on:
      - db
      - elastic
      - redis
    networks:
      - otobo_net

  daemon:
    image: rotheross/otobo:latest
    command: daemon
    environment:
      - OTOBO_DB_TYPE=mysql
      - OTOBO_DB_HOST=db
      - OTOBO_DB_PORT=3306
      - OTOBO_DB_USER=otobo
      - OTOBO_DB_PASSWORD=${OTOBO_DB_PASSWORD}
      - OTOBO_DB_NAME=otobo
      - OTOBO_ELASTICSEARCH_HOST=elastic
      - OTOBO_ELASTICSEARCH_PORT=9200
      - OTOBO_REDIS_HOST=redis
      - OTOBO_REDIS_PORT=6379
    volumes:
      - ./otobo_opt:/opt/otobo
    depends_on:
      - db
      - elastic
      - redis
    networks:
      - otobo_net

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=${OTOBO_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=otobo
      - MYSQL_USER=otobo
      - MYSQL_PASSWORD=${OTOBO_DB_PASSWORD}
    volumes:
      - ./mariadb_data:/var/lib/mysql
    command: --max_allowed_packet=64M --innodb_log_file_size=256M --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - otobo_net

  elastic:
    image: elasticsearch:7.17.14
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ./elastic_data:/usr/share/elasticsearch/data
    networks:
      - otobo_net

  redis:
    image: redis:alpine
    volumes:
      - ./redis_data:/data
    networks:
      - otobo_net

networks:
  otobo_net:
    driver: bridge
