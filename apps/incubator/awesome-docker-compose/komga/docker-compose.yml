services:
  komga:
    image: gotson/komga
    container_name: komga
    # Runs as user 1000:1000 by default. Adjust if necessary to match your host user.
    user: "1000:1000"
    environment:
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - ./media:/data
    ports:
      - 25600:25600
    restart: unless-stopped
