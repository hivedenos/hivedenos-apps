services:
  medama:
    image: ghcr.io/medama-io/medama:latest
    container_name: medama
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    # Environment variables can be added here or in .env if needed for advanced config
    # environment:
    #   - TZ=UTC
