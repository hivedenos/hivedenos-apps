services:
  mariadb:
    image: mariadb:10.11
    container_name: itflow_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mariadb_data:/var/lib/mysql

  itflow:
    image: itflow/itflow:latest
    container_name: itflow_app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mariadb
    environment:
      - DB_HOST=mariadb
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASSWORD}
    volumes:
      - ./itflow_data:/var/www/html
