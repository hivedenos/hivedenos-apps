services:
  tinymediamanager:
    image: tinymediamanager/tinymediamanager:latest
    container_name: tinymediamanager
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - PASSWORD=${TMM_PASSWORD}
    volumes:
      - ./tmm_data:/data
      - ./media:/media
    ports:
      - "5800:5800"
      - "5900:5900"
    restart: unless-stopped
