services:
  wekan-db:
    image: mongo:5
    container_name: wekan-db
    restart: always
    command: mongod --oplogSize 128 --replSet rs0 --schemeVersion=1
    volumes:
      - ./data/db:/data/db
      - ./data/dump:/dump

  wekan:
    image: ghcr.io/wekan/wekan:latest
    container_name: wekan
    restart: always
    ports:
      - 8080:8080
    environment:
      - MONGO_URL=mongodb://wekan-db:27017/wekan
      - ROOT_URL=http://localhost:8080
      - MAIL_URL=${MAIL_URL}
      - WITH_API=true
    depends_on:
      - wekan-db
