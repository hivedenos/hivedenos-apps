services:
  nefarious:
    image: lardbit/nefarious:latest
    container_name: nefarious
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - VPN_USER=${VPN_USER}
      - VPN_PASS=${VPN_PASS}
    volumes:
      - ./config:/config
      - ./data:/data
    ports:
      - 8000:8000
    restart: unless-stopped
