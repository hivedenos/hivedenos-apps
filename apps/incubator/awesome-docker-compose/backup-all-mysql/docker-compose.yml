services:
  backup-all-mysql:
    image: dsteinkopf/backup-all-mysql:latest
    container_name: backup-all-mysql
    environment:
      - MYSQL_HOST=192.168.1.100
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - CRON_TIME=0 2 * * *
      - MAX_BACKUPS=14
    volumes:
      - ./backup:/backup
    restart: unless-stopped
