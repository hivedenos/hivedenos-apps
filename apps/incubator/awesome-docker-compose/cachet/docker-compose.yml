services:
  postgres:
    image: postgres:14-alpine
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: cachet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cachet

  cachet:
    image: cachethq/docker:2.3.18
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DB_DRIVER: pgsql
      DB_HOST: postgres
      DB_DATABASE: cachet
      DB_USERNAME: cachet
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8000
      APP_ENV: production
      APP_DEBUG: "false"
