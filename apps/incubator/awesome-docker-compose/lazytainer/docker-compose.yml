services:
  lazytainer:
    container_name: lazytainer
    image: ghcr.io/vmorganp/lazytainer:master
    environment:
      - PORT=80,81
      - LABEL=lazytainer
      - TIMEOUT=30
      - MINPACKET=0
      - VERBOSE=true
    ports:
      - 80:80
      - 81:81
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  whoami:
    container_name: whoami
    image: containous/whoami
    labels:
      - "lazytainer=true"
    network_mode: service:lazytainer
    depends_on:
      - lazytainer
