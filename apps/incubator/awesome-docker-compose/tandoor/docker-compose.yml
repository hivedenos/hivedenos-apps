services:
  db_recipes:
    image: postgres:15-alpine
    restart: always
    volumes:
      - ./postgresql:/var/lib/postgresql/data
    env_file:
      - .env

  web_recipes:
    image: vabene1111/recipes
    restart: always
    ports:
      - 8080:8080
    env_file:
      - .env
    volumes:
      - ./static:/opt/recipes/staticfiles
      - ./media:/opt/recipes/mediafiles
    depends_on:
      - db_recipes
