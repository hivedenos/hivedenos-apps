services:
  gonic:
    image: sentriz/gonic:latest
    container_name: gonic
    environment:
      - TZ=Etc/UTC
      - GONIC_ADMIN_PASSWORD=${GONIC_ADMIN_PASSWORD}
    ports:
      - "4747:80"
    volumes:
      - ./data:/data
      - ./music:/music
      - ./podcasts:/podcasts
      - ./playlists:/playlists
    restart: unless-stopped
