services:
  redaxo:
    image: friendsofredaxo/redaxo:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./redaxo-data:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:10.6
    restart: unless-stopped
    volumes:
      - ./db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: redaxo
      MYSQL_USER: redaxo
      MYSQL_PASSWORD: ${DB_PASSWORD}
