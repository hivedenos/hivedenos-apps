services:
  db:
    image: postgres:14
    container_name: wger_db
    environment:
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wger
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  cache:
    image: redis:7
    container_name: wger_cache
    volumes:
      - ./redis-data:/data
    restart: unless-stopped

  web:
    image: wger/server:latest
    container_name: wger_web
    depends_on:
      - db
      - cache
    environment:
      SECRET_KEY: ${SECRET_KEY}
      SITE_URL: http://localhost:8000
      POSTGRES_HOST: db
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wger
      REDIS_HOST: cache
      REDIS_PORT: 6379
      REDIS_DB: 1
      CELERY_BROKER_URL: redis://cache:6379/2
      CELERY_RESULT_BACKEND: redis://cache:6379/2
      CSRF_TRUSTED_ORIGINS: http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./static:/home/wger/static
      - ./media:/home/wger/media
    restart: unless-stopped

  celery:
    image: wger/server:latest
    container_name: wger_celery
    command: celery -A wger worker --loglevel=info
    depends_on:
      - db
      - cache
      - web
    environment:
      SECRET_KEY: ${SECRET_KEY}
      SITE_URL: http://localhost:8000
      POSTGRES_HOST: db
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wger
      REDIS_HOST: cache
      REDIS_PORT: 6379
      REDIS_DB: 1
      CELERY_BROKER_URL: redis://cache:6379/2
      CELERY_RESULT_BACKEND: redis://cache:6379/2
    volumes:
      - ./media:/home/wger/media
    restart: unless-stopped
