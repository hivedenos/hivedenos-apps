services:
  yt-dlp-webui:
    image: marcobaobao/yt-dlp-webui:latest
    container_name: yt-dlp-webui
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    ports:
      - "3000:3000"
    restart: unless-stopped
