services:
  navidrome:
    image: deluan/navidrome:latest
    user: "1000:1000" # Should be changed to match your host user's UID:GID
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
    volumes:
      - ./data:/data
      - ./music:/music:ro
