services:
  photostructure:
    image: photostructure/server:latest
    container_name: photostructure
    restart: unless-stopped
    ports:
      - "1787:1787"
    environment:
      - TZ=Etc/UTC
      - PUID=1000
      - PGID=1000
      - PS_LICENSE_KEY=${PS_LICENSE_KEY}
    volumes:
      - ./library:/ps/library
      - ./tmp:/ps/tmp
      - ./config:/ps/config
      - ./logs:/ps/logs
      - ./photos:/photos:ro
