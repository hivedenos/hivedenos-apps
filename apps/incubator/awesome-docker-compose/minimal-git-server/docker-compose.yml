services:
  git-server:
    image: ghcr.io/mcarbonne/minimal-git-server:latest
    container_name: minimal-git-server
    restart: unless-stopped
    ports:
      - "2222:22"
      - "8080:80"
    volumes:
      - ./git-data:/git
      - ./ssh-keys:/root/.ssh
    environment:
      - GIT_ADMIN_USERNAME=${GIT_ADMIN_USERNAME}
      - GIT_ADMIN_PASSWORD=${GIT_ADMIN_PASSWORD}
