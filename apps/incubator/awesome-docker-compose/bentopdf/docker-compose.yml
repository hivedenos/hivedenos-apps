services:
  bentopdf:
    image: ghcr.io/alam00000/bentopdf:latest
    container_name: bentopdf
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/configs
      - ./data:/app/data
    environment:
      - PUID=1000
      - PGID=1000
      - APP_PORT=8080
      - SECRET_KEY=${SECRET_KEY}
    restart: unless-stopped
