services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: mathesar
      POSTGRES_USER: mathesar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./mathesar-db-data:/var/lib/postgresql/data

  mathesar:
    image: mathesar/mathesar:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: mathesar
      POSTGRES_USER: mathesar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - db
