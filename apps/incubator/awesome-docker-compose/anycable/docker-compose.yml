services:
  anycable:
    image: anycable/anycable-go:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ANYCABLE_HOST: "0.0.0.0"
      ANYCABLE_PORT: "8080"
      ANYCABLE_RPC_HOST: ${ANYCABLE_RPC_HOST}
      ANYCABLE_REDIS_URL: ${ANYCABLE_REDIS_URL}
      ANYCABLE_DEBUG: "true"
    depends_on:
      - redis
    networks:
      - anycable_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./redis-data:/data
    networks:
      - anycable_net

networks:
  anycable_net:
