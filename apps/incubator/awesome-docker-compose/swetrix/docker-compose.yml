services:
  postgres:
    image: postgres:15-alpine
    container_name: swetrix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - swetrix-network

  redis:
    image: redis:7-alpine
    container_name: swetrix_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    networks:
      - swetrix-network

  clickhouse:
    image: clickhouse/clickhouse-server:23-alpine
    container_name: swetrix_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - swetrix-network

  api:
    image: swetrix/api:latest
    container_name: swetrix_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - clickhouse
    ports:
      - "${API_PORT}:3000"
    environment:
      DB_CONNECTION_STRING: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLICKHOUSE_HOST: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${SMTP_HOST}
      MAIL_PORT: ${SMTP_PORT}
      MAIL_USER: ${SMTP_USER}
      MAIL_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: ${SMTP_FROM}
      # Set to true to disable new user registration
      REGISTRATION_DISABLED: ${REGISTRATION_DISABLED}
    networks:
      - swetrix-network

  cron:
    image: swetrix/api:latest
    container_name: swetrix_cron
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - clickhouse
    command: node cron.js
    environment:
      DB_CONNECTION_STRING: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLICKHOUSE_HOST: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    networks:
      - swetrix-network

  client:
    image: swetrix/client:latest
    container_name: swetrix_client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${CLIENT_PORT}:80"
    environment:
      API_URL: ${PUBLIC_API_URL}
    networks:
      - swetrix-network

networks:
  swetrix-network:
    driver: bridge
