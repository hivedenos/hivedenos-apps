services:
  2fauth:
    image: 2fauth/2fauth:latest
    container_name: 2fauth
    restart: unless-stopped
    ports:
      - 8000:8000
    volumes:
      - ./data:/2fauth
    environment:
      - APP_NAME=2FAuth
      - APP_ENV=production
      - APP_DEBUG=false
      - SITE_OWNER=${SITE_OWNER}
      - APP_KEY=${APP_KEY}
      - AUTHENTICATION_GUARD=web-guard
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
