services:
  komodo-core:
    image: ghcr.io/moghtech/komodo:latest
    container_name: komodo-core
    ports:
      - "9120:9120"
    volumes:
      - ./data:/config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - KOMODO_JWT_SECRET=${KOMODO_JWT_SECRET}
    restart: unless-stopped
