services:
  podfetch:
    image: samtv12345/podfetch:latest
    container_name: podfetch
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
      - ./podcasts:/app/podcasts
    environment:
      - POLLING_INTERVAL=60
      - SERVER_URL=http://localhost:8000
      - DATABASE_URL=sqlite:///app/db/podcast.db
    restart: unless-stopped
