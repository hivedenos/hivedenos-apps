services:
  postgres:
    restart: unless-stopped
    env_file: .env
    image: postgres:15
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: unless-stopped
    env_file: .env
    image: redis:7
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  typesense:
    restart: unless-stopped
    env_file: .env
    image: typesense/typesense:0.24.0
    volumes:
      - ./data/typesense:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8108/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    restart: unless-stopped
    env_file: .env
    image: funkwhale/funkwhale:${FUNKWHALE_VERSION:-latest}
    depends_on:
      - postgres
      - redis
      - typesense
    volumes:
      - ./data/music:/music:ro
      - ./data/media:/app/data/media
      - ./data/static:/app/data/static
    ports:
      - "${FUNKWHALE_API_PORT:-5000}:5000"

  celeryworker:
    restart: unless-stopped
    env_file: .env
    image: funkwhale/funkwhale:${FUNKWHALE_VERSION:-latest}
    depends_on:
      - postgres
      - redis
    command: celery -A funkwhale_api.taskapp worker -l INFO --concurrency=${CELERYD_CONCURRENCY:-0}
    volumes:
      - ./data/music:/music:ro
      - ./data/media:/app/data/media
      - ./data/static:/app/data/static

  celerybeat:
    restart: unless-stopped
    env_file: .env
    image: funkwhale/funkwhale:${FUNKWHALE_VERSION:-latest}
    depends_on:
      - postgres
      - redis
    command: celery -A funkwhale_api.taskapp beat -l INFO
    volumes:
      - ./data/music:/music:ro
      - ./data/media:/app/data/media
      - ./data/static:/app/data/static
