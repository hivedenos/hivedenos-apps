services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: example_db
    volumes:
      - ./mysql-data:/var/lib/mysql

  backup:
    image: databacker/mysql-backup:latest
    restart: always
    depends_on:
      - db
    environment:
      DB_SERVER: db
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD}
      DB_NAMES: example_db
      CRON_TIME: "0 0 * * *"
      MAX_BACKUPS: 7
      INIT_BACKUP: "true"
    volumes:
      - ./backups:/db_backup
