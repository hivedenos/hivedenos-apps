services:
  docs:
    image: sismics/docs:latest
    container_name: sismics-docs
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DOCS_BASE_URL: http://localhost:8080
      DOCS_ADMIN_EMAIL_INIT: ${ADMIN_EMAIL}
      DOCS_ADMIN_PASSWORD_INIT: ${ADMIN_PASSWORD}
    volumes:
      - ./data:/data
