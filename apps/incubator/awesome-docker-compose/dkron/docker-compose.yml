services:
  dkron:
    image: dkron/dkron:latest
    container_name: dkron
    command: agent --server --bootstrap-expect=1 --data-dir=/dkron.data
    ports:
      - "8080:8080"
      - "8946:8946"
      - "8946:8946/udp"
    volumes:
      - ./dkron-data:/dkron.data
    environment:
      - DKRON_ENCRYPT=${DKRON_ENCRYPT}
    restart: unless-stopped
