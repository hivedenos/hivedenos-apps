services:
  postgres:
    image: postgres:15-alpine
    container_name: worklenz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: worklenz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: worklenz
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - worklenz-network

  redis:
    image: redis:7-alpine
    container_name: worklenz-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - worklenz-network

  server:
    image: worklenz/server:latest
    container_name: worklenz-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: worklenz
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: worklenz
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      # Adjust the client URL to match your domain/IP
      CLIENT_URL: http://localhost:8080
    ports:
      - "3000:3000"
    networks:
      - worklenz-network

  client:
    image: worklenz/client:latest
    container_name: worklenz-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      # Adjust the API URL to match your domain/IP
      API_URL: http://localhost:3000
    ports:
      - "8080:80"
    networks:
      - worklenz-network

networks:
  worklenz-network:
    driver: bridge
