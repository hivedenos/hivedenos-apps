services:
  convos:
    image: ghcr.io/convos-chat/convos:stable
    container_name: convos
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - CONVOS_HOME=/data
      - CONVOS_SECRET=${CONVOS_SECRET}
      - CONVOS_INVITE_CODE=${CONVOS_INVITE_CODE}
