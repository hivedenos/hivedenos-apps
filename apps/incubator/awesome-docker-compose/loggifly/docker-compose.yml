services:
  loggifly:
    image: ghcr.io/clemcer/loggifly:latest
    container_name: loggifly
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/var/log/loggifly
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PORT=8080
    restart: unless-stopped
