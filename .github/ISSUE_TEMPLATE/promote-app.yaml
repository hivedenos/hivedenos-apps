name: Promote App
description: Promote an App from an Incubator Channel
title: "Promote: [App Name]"
labels: ["promote-app"]
body:
  - type: input
    id: app-name
    attributes:
      label: App Name
      placeholder: e.g., My Awesome App
    validations:
      required: true

  - type: input
    id: incubator-channel
    attributes:
      label: Incubator Channel
      placeholder: e.g., #beta-testing
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What does this app do?

  - type: textarea
    id: extra-info
    attributes:
      label: Extra Info (optional)
